<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Premium metallic gradient inspired by Apple -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle highlight for glass effect -->
    <radialGradient id="highlight" cx="35%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Inner shadow for depth -->
    <linearGradient id="innerShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
    
    <!-- Premium drop shadow -->
    <filter id="premiumShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background with filter -->
  <g filter="url(#premiumShadow)">
    <rect width="200" height="200" fill="url(#metalGrad)" rx="50" ry="50"/>
  </g>
  
  <!-- Glass/highlight effect -->
  <circle cx="70" cy="70" r="65" fill="url(#highlight)"/>
  
  <!-- Inner depth shadow -->
  <rect width="200" height="100" fill="url(#innerShadow)" rx="50" ry="50"/>
  
  <!-- Polished border -->
  <rect x="3" y="3" width="194" height="194" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="47" ry="47"/>
  
  <!-- Premium PJ text with kerning -->
  <text x="100" y="115" font-family="'-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1.5" style="paint-order: stroke; stroke: rgba(0,0,0,0.1); stroke-width: 0.5px;">PJ</text>
</svg>